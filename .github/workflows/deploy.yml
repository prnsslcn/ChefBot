name: Deploy Flask App on EC2

on:
  push:
    branches:
      - backend-rag

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Repository Checkout
        uses: actions/checkout@v4

      - name: Upload Flask Project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "."  # 현재 프로젝트 전체 업로드
          target: "/home/ubuntu/flask_app"

      - name: Deploy Flask App on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "ChefBot 애플리케이션 배포 시작"
            cd /home/ubuntu/flask_app

            # Python & 필수 패키지 설치 (최소한으로)
            echo "Python 환경 설정"
            sudo apt update && sudo apt install -y python3 python3-venv python3-pip

            # 가상 환경 생성 및 활성화
            python3 -m venv venv
            source venv/bin/activate

            # 필요한 패키지만 설치
            pip install --upgrade pip
            pip install -r requirements.txt

            # .env 파일 설정 
            echo "환경 변수 설정"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env

            # systemd 서비스 파일 생성 (자동 재시작 제거)
            echo "Flask 서비스 파일 생성"
            sudo tee /etc/systemd/system/flask-app.service > /dev/null <<EOT
            [Unit]
            Description=Gunicorn instance to serve Flask app
            After=network.target

            [Service]
            User=ubuntu
            Group=ubuntu
            WorkingDirectory=/home/ubuntu/flask_app
            Environment="PATH=/home/ubuntu/flask_app/venv/bin"
            ExecStart=/home/ubuntu/flask_app/venv/bin/gunicorn --workers 1 --bind 0.0.0.0:8000 app:app

            [Install]
            WantedBy=multi-user.target
            EOT

            # systemd 서비스 실행 및 활성화
            echo "ChefBot 애플리케이션 실행"
            sudo systemctl daemon-reload
            sudo systemctl enable flask-app
            sudo systemctl restart flask-app
            sudo systemctl status flask-app --no-pager

            echo "배포 완료"
