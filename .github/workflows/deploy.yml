name: Deploy Flask App on EC2

on:
  push:
    branches:
      - backend-deploy

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: GitHub Repository Checkout
        uses: actions/checkout@v4

      - name: Upload Flask Project to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "."  # 현재 프로젝트 전체 업로드
          target: "/home/ubuntu/flask_app"

      - name: Deploy Flask App on EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "ChefBot 애플리케이션 배포 시작"
            cd /home/ubuntu/flask_app

            # Python & 필수 패키지 설치 (최소한으로)
            echo "Python 환경 설정"
            sudo apt update && sudo apt install -y python3 python3-venv python3-pip

            # 가상 환경 생성 (이미 존재하면 유지)
            if [ ! -d "venv" ]; then
              echo "가상환경이 없음. 새로 생성합니다."
              python3 -m venv venv
            else
              echo "기존 가상환경을 유지합니다."
            fi
            source venv/bin/activate

            # 패키지 변경 사항 확인 후 필요할 때만 설치
            if ! pip freeze | grep -Ff requirements.txt > /dev/null; then
              echo "패키지 변경 사항 감지됨. requirements.txt 업데이트 진행..."
              pip install --upgrade pip
              pip install -r requirements.txt
            else
              echo "패키지 변경 없음. 설치 스킵."
            fi

            # Gunicorn 실행 권한 부여
            chmod +x /home/ubuntu/flask_app/venv/bin/gunicorn

            # .env 파일 설정
            echo "환경 변수 설정"
            echo "OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env

            # systemd 서비스 파일 수정
            sudo tee /etc/systemd/system/flask-app.service > /dev/null <<EOT
            [Unit]
            Description=Gunicorn instance to serve Flask app
            After=network.target

            [Service]
            User=ubuntu
            Group=ubuntu
            WorkingDirectory=/home/ubuntu/flask_app
            Environment="VIRTUAL_ENV=/home/ubuntu/flask_app/venv"
            Environment="PATH=/home/ubuntu/flask_app/venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            ExecStart=/home/ubuntu/flask_app/venv/bin/gunicorn --workers 1 --threads 3 --timeout 120 --bind 0.0.0.0:8000 app:app

            [Install]
            WantedBy=multi-user.target
            EOT

            # 서비스 상태 확인 후 실행 필요할 때만 재시작
            if systemctl is-active --quiet flask-app; then
              echo "flask-app 서비스가 실행 중입니다. 재시작하지 않습니다."
            else
              echo "flask-app 서비스가 중지됨. 다시 시작합니다."
              sudo systemctl restart flask-app
            fi

            # 서비스 상태 확인 및 로그 출력
            sudo systemctl status flask-app --no-pager
            echo "최근 서비스 로그 확인"
            sudo journalctl --vacuum-time=3d  # 오래된 로그 정리
            sudo journalctl -u flask-app --no-pager --no-full -n 50

            echo "배포 완료"